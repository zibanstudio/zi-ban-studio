<!DOCTYPE html>
<html lang="en">
<head>
  <!-- google analytics tracking -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-BN6XQ99DS3"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-BN6XQ99DS3');
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Contact | Zi Ban</title>
  <meta name="description" content="Contact Zi Ban for commissions, collaborations, and portfolio inquiries." />

  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script defer src="script.js"></script>
</head>

<body>
  <header class="site-header">
    <a href="index.html" class="brand">
      <img src="logo.png" class="signature-logo" alt="Zi Ban logo" />
    </a>

    <nav class="site-nav">
      <a href="about.html">About</a>
      <a href="work.html">Work</a>
      <a href="media.html">Media</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
  </header>

  <main class="page contact-page-clean">
    <section class="contact-intro-clean reveal">
      <p class="contact-kicker-clean">Contact</p>
      <h1 class="contact-title-clean">Get in touch</h1>
      <p class="contact-summary-clean">
        For commissions, collaborations, or project inquiries, feel free to reach out.
      </p>
    </section>

    <section class="contact-form-wrap-clean reveal">
      <form
        action="https://formsubmit.co/zi.ban.studio@gmail.com"
        method="POST"
        class="contact-form-clean"
      >
        <input type="hidden" name="_subject" value="New portfolio inquiry from zi ban website" />
        <input type="hidden" name="_captcha" value="false" />
        <input type="hidden" name="_template" value="table" />
        <input type="hidden" name="_next" value="https://zibanstudio.github.io/zi-ban-studio/thankyou.html" />

        <div class="contact-field-clean">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" required />
        </div>

        <div class="contact-field-clean">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required />
        </div>

        <div class="contact-field-clean">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="8" required></textarea>
        </div>

        <button type="submit" class="contact-button-clean">Send message</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <p>© 2026 Zi Ban</p>
    <div class="footer-links">
      <a href="contact.html">Contact</a>
      <span>Privacy Policy</span>
      <span>Site Terms</span>
    </div>
  </footer>
</body>
</html>
